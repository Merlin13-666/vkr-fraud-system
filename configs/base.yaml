seed: 42

schema_path: "configs/schema_ieee_cis.yaml"

data:
  raw_path: "data/raw/ieee-cis"
  processed_path: "data/processed"

split:
  train_ratio: 0.6
  val_ratio: 0.2
  test_ratio: 0.2

target:
  name: "isFraud"

graph:
  min_freq: 10
  max_rows: null   # можно поставить число для отладки, например 200000
  entity_cols:
    card: ["card1"]
    email: ["P_emaildomain", "R_emaildomain"]
    addr: ["addr1", "addr2"]
    device: ["DeviceInfo", "DeviceType"]